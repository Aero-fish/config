# -----------------------------
#          Variables
# -----------------------------
# Mod list: SHIFT CAPS CTRL/CONTROL ALT MOD2 MOD3 SUPER/WIN/LOGO/MOD4 MOD5

# System: MOD + CTRL
# Layout: MOD + ALT
# Move: MOD + SHIFT
# Monitor move: MOD + CTRL + SHIFT

# Mod key
$MOD = SUPER

# Home row direction keys, like vim
$left = h
$down = j
$up = k
$right = l

# Paths
$scripts_dir = "$HOME"/.config/hypr/scripts

# Commands
$toggle_waybar = "pkill -x -SIGUSR1 waybar"

# -----------------------------
#          Monitor
# -----------------------------
# Use 'hyprctl monitors' to check spec.
# monitor = name/desc:description, resolution, position, scale
# monitor = DP-1, 1920x1080@144, 0x0, 1, transform, 1, mirror, DP-2, bitdepth, 10
# monitor = name/desc, disable

monitorv2 {
    output = desc:ASUSTek COMPUTER INC PG32UCDM S3LMQS068423
    mode = 3840x2160@240.02
    position = auto-right
    scale = auto
    bitdepth = 10
    vrr = 2  # 0 - off, 1 - on, 2 - fullscreen only, 3 - fullscreen with video or game content type
    supports_wide_color = 1
    supports_hdr = 1
}

monitorv2 {
    output = desc:Samsung Display Corp. ATNA60CL10-0
    mode = 2880x1800@120.00
    position = auto-right
    scale = 1
    bitdepth = 10
    vrr = 2  # 0 - off, 1 - on, 2 - fullscreen only, 3 - fullscreen with video or game content type
    supports_wide_color = 1
    supports_hdr = 1
}

monitorv2 {
    output = desc:Chimei Innolux Corporation 0x13B0
    mode = 2560x1600@60.00
    position = auto-right
    vrr = 0  # 0 - off, 1 - on, 2 - fullscreen only, 3 - fullscreen with video or game content type
    scale = 1
}

monitorv2 {
    output =
    mode = highres
    position = auto-right
    vrr = 0
    scale = auto
}

# -----------------------------
#         Animations
# -----------------------------
animations {
    enabled = false
    # bezier = easeOutQuint,0.23,1,0.32,1
    # bezier = easeInOutCubic,0.65,0.05,0.36,1
    # bezier = linear,0,0,1,1
    # bezier = almostLinear,0.5,0.5,0.75,1.0
    # bezier = quick,0.15,0,0.1,1

    # animation = NAME, ONOFF, SPEED, CURVE [,STYLE]
    # ONOFF can be either 0 or 1, 0 to disable, 1 to enable. note: if it’s 0, you can omit further args.
    # SPEED is the amount of ds (1ds = 100ms) the animation will take
    # CURVE is the bezier curve name, see curves.
    # STYLE (optional) is the animation style

    animation = global, 1, 1, default
    animation = workspaces, 0
}

# -----------------------------
#         Settings
# -----------------------------
general {
    border_size = 4
    gaps_in = 8
    gaps_out = 16
    col.active_border = 0xfff5c2e7
    col.inactive_border = 0xff505050
    layout = dwindle
    resize_on_border = false
}

decoration {
    # active_opacity = 1.0
    # inactive_opacity = 0.7
    # fullscreen_opacity = 1.0
    blur {
        # Blur wall paper. Works with decoration:inactive_opacity = 0.5
        enabled = false
        size = 12
        passes = 4
        xray = true
    }
    shadow {
        range = 16
    }
}

input {
    accel_profile = flat
    mouse_refocus = false
    touchpad {
        natural_scroll = true
    }
}

device {
    name = asuf1209:00-2808:0219-touchpad
    accel_profile = adaptive
}

group {
    col.border_locked_active = 0x66ff5500
    groupbar {
        font_size = 24
        indicator_height = 6
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    font_family = Maple Mono NF CN
    middle_click_paste = false
}

cursor {
    inactive_timeout = 0
    no_warps = true # Do not move the cursor when changing focus using keyboard
    hide_on_key_press = false
    hide_on_touch = false
    no_break_fs_vrr = 1 # 0 - off, 1 - on, 2 - auto (on with content type 'game')
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
    enforce_permissions = true
}

dwindle {
    force_split = 2
}

# -----------------------------
#        Window rules
# -----------------------------
# Smart gaps
workspace = w[tv1], bordersize 0, gapsout:0, gapsin:0
workspace = f[1], bordersize 0, gapsout:0, gapsin:0
windowrule = border_size 0, match:float 0, match:workspace w[tv1]
windowrule = rounding 0, match:float 0, match:workspace w[tv1]
windowrule = border_size 0, match:float 0, match:workspace f[1]
windowrule = rounding 0, match:float 0, match:workspace f[1]

# No border for float
windowrule = border_size 0, match:float 1


# windowrule {
#   name = Transparency terminal
#   opacity = 0.8
#   match:class = (kitty|nethogs|arch_update|aerc|config_repo|file_operation_progress)
# }

windowrule {
  name = Window property inspection
  float = on
  size = (monitor_w*0.4) (monitor_h*0.5)
  center = on
  match:class = prop
}

windowrule {
  name = Black out sensitive programs
  no_screen_share = on
  match:class = (org.keepassxc.KeePassXC|firefox)
}

windowrule {
  name = Auto size librewolf popup
  float = on
  max_size = (monitor_w*0.25) (monitor_h*0.25)
  move = ((monitor_w*1)-window_w-0) ((monitor_h*1)-window_h-40)
  pin = on
  keep_aspect_ratio = on
  match:class = librewolf
  match:title = Picture-in-Picture
}

windowrule {
  name = Nautilus Previewer
  float = on
  no_initial_focus = on
  center = on
  match:class = org.gnome.NautilusPreviewer
}

windowrule {
  name =  Float rule 1
  float = on
  center = on
  match:class = ^(SVPManager|org.gnome.Calculator|org.fcitx.fcitx5-config-qt)$
}

windowrule {
  name = Float rule 2
  float = on
  size = (monitor_w*0.5) (monitor_h*0.6)
  center = on
  pin = on
  match:class = org.gnome.SystemMonitor
}

windowrule {
  name = Float rule 3
  float = on
  size = (monitor_w*0.4) (monitor_h*0.5)
  center = on
  pin = on
  match:class = ^(system-config-printer|wdisplays|wlay|launcher|fzf|org.pulseaudio.pavucontrol|com.github.wwmm.easyeffects|blueman-manager)$
}

# -----------------------------
#       Keymap - System
# -----------------------------
# Kill active window
bind = $MOD, q, killactive  # Close
bind = $MOD SHIFT, q, forcekillactive  # Kill

# Toggle waybar
bind = $MOD CTRL, space, execr, "$toggle_waybar"

# Active window info
bind = $MOD CTRL, slash, execr, "$scripts_dir/hyprland-prop.sh" kitty

# Lock system
bind = $MOD CTRL, backspace, execr, "$scripts_dir/lock.sh" force

# Reload
bind = $MOD CTRL, r, execr, hyprctl reload

# Colour picker
bind = $MOD CTRL, p, execr, uwsm app -- sh -c "hyprpicker | tail -n1 | wl-copy"

# -----------------------------
#       Keymap - Window
# -----------------------------
# Move focus
bind = $MOD, $left, movefocus, l
bind = $MOD, $right, movefocus, r
bind = $MOD, $up, movefocus, u
bind = $MOD, $down, movefocus, d

bind = $MOD, left, movefocus, l
bind = $MOD, right, movefocus, r
bind = $MOD, up, movefocus, u
bind = $MOD, down, movefocus, d

bind = ALT, tab, cyclenext
bind = ALT SHIFT, tab, cyclenext, prev

gesture = 3, horizontal, workspace

# Resize window
binde= $MOD ALT, $right, resizeactive,50 0
binde= $MOD ALT, $left, resizeactive,-50 0
binde= $MOD ALT, $up, resizeactive,0 -50
binde= $MOD ALT, $down, resizeactive,0 50

binde= $MOD ALT, right, resizeactive,50 0
binde= $MOD ALT, left, resizeactive,-50 0
binde= $MOD ALT, up, resizeactive,0 -50
binde= $MOD ALT, down, resizeactive,0 50

# Move/resize windows with MOD + LMB/RMB and dragging
bindm = $MOD, mouse:272, movewindow
bindm = $MOD, mouse:273, resizewindow

# Move windows
bind = $MOD SHIFT, $left, movewindow, l
bind = $MOD SHIFT, $right, movewindow, r
bind = $MOD SHIFT, $up, movewindow, u
bind = $MOD SHIFT, $down, movewindow, d

bind = $MOD SHIFT, left, movewindow, l
bind = $MOD SHIFT, right, movewindow, r
bind = $MOD SHIFT, up, movewindow, u
bind = $MOD SHIFT, down, movewindow, d

# Resize split to 50%:50%
bind = $MOD, equal, splitratio, exact 1

# Toggle fullscreen
bind = $MOD, f, fullscreen, 0
bind = $MOD SHIFT, f, fullscreen, 1  # maximize (keeps waybar)

# Toggle floating
bind = $MOD ALT, f, togglefloating

# Toggle pin (Show in all workspaces, floating only)
bind = $MOD ALT, p, pin
bind = $MOD ALT, p, execr, if [ "$(hyprctl activewindow -j | jq -r '.floating')" = "true" ]; then if [ "$(hyprctl activewindow -j | jq -r '.pinned')" = "true" ]; then notify-send 'Pinned'; else notify-send 'Unpinned'; fi; else notify-send 'Can only pin floating window'; fi

# Move active window to a workspace and switch to it
bind = $MOD SHIFT, 1, movetoworkspace, 1
bind = $MOD SHIFT, 2, movetoworkspace, 2
bind = $MOD SHIFT, 3, movetoworkspace, 3
bind = $MOD SHIFT, 4, movetoworkspace, 4
bind = $MOD SHIFT, 5, movetoworkspace, 5
bind = $MOD SHIFT, 6, movetoworkspace, 6
bind = $MOD SHIFT, 7, movetoworkspace, 7
bind = $MOD SHIFT, 8, movetoworkspace, 8
bind = $MOD SHIFT, 9, movetoworkspace, 9
bind = $MOD SHIFT, 0, movetoworkspace, 10
bind = $MOD SHIFT, d, movetoworkspace, empty

# Move active window to a workspace
bind = $MOD SHIFT ALT, 1, movetoworkspacesilent, 1
bind = $MOD SHIFT ALT, 2, movetoworkspacesilent, 2
bind = $MOD SHIFT ALT, 3, movetoworkspacesilent, 3
bind = $MOD SHIFT ALT, 4, movetoworkspacesilent, 4
bind = $MOD SHIFT ALT, 5, movetoworkspacesilent, 5
bind = $MOD SHIFT ALT, 6, movetoworkspacesilent, 6
bind = $MOD SHIFT ALT, 7, movetoworkspacesilent, 7
bind = $MOD SHIFT ALT, 8, movetoworkspacesilent, 8
bind = $MOD SHIFT ALT, 9, movetoworkspacesilent, 9
bind = $MOD SHIFT ALT, 0, movetoworkspacesilent, 10
bind = $MOD SHIFT ALT, d, movetoworkspacesilent, empty

# -----------------------------
#       Keymap - Workspace
# -----------------------------
bind = $MOD, 1, workspace, 1
bind = $MOD, 2, workspace, 2
bind = $MOD, 3, workspace, 3
bind = $MOD, 4, workspace, 4
bind = $MOD, 5, workspace, 5
bind = $MOD, 6, workspace, 6
bind = $MOD, 7, workspace, 7
bind = $MOD, 8, workspace, 8
bind = $MOD, 9, workspace, 9
bind = $MOD, 0, workspace, 10
bind = $MOD, d, workspace, empty

# Scroll through existing workspaces
bind = $MOD, mouse_up, workspace, e-1
bind = $MOD, mouse_down, workspace, e+1

bind = $MOD CTRL, left, workspace, e-1
bind = $MOD CTRL, right, workspace, e+1

bind = $MOD CTRL, $left, workspace, e-1
bind = $MOD CTRL, $right, workspace, e+1

bind = $MOD SHIFT, tab, workspace, e-1
bind = $MOD, tab, workspace, e+1

# -----------------------------
#   Keymap - Multi-monitors
# -----------------------------
bind = $MOD CTRL SHIFT, $left, focusmonitor, l
bind = $MOD CTRL SHIFT, $right, focusmonitor, r
bind = $MOD CTRL SHIFT, $up, focusmonitor, u
bind = $MOD CTRL SHIFT, $down, focusmonitor, d

bind = $MOD CTRL SHIFT, left, focusmonitor, l
bind = $MOD CTRL SHIFT, right, focusmonitor, r
bind = $MOD CTRL SHIFT, up, focusmonitor, u
bind = $MOD CTRL SHIFT, down, focusmonitor, d

# -----------------------------
#       Keymap - Group
# -----------------------------
bind = $MOD ALT SHIFT, g, togglegroup    # Toggle tab/group mode for current window
bind = $MOD ALT SHIFT, f, lockgroups, toggle    # Freeze group, toggle allow new tab,
bind = $MOD ALT SHIFT, $left, moveintogroup, l
bind = $MOD ALT SHIFT, $right, moveintogroup, r
bind = $MOD ALT SHIFT, $up, moveintogroup, u
bind = $MOD ALT SHIFT, $down, moveintogroup, d
bind = $MOD ALT SHIFT, o, moveoutofgroup

bind = $MOD ALT SHIFT, $right, changegroupactive, f    # Next tab in current window
bind = $MOD ALT SHIFT, $left, changegroupactive, b    # Previous tab in current window

bind = $MOD ALT SHIFT, right, changegroupactive, f    # Next tab in current window
bind = $MOD ALT SHIFT, left, changegroupactive, b    # Previous tab in current window

# -----------------------------
#     Keymap - Media
# -----------------------------
bindle = , XF86AudioRaiseVolume, execr, swayosd-client --output-volume raise
bindle = , XF86AudioLowerVolume, execr, swayosd-client --output-volume lower
bindle = , XF86AudioMute, execr, swayosd-client --output-volume mute-toggle
bindle = , XF86AudioMicMute, execr, swayosd-client --input-volume mute-toggle

# Brightness do not go below 10%
bindle = , XF86MonBrightnessUp, execr, swayosd-client --brightness raise
bindle = , XF86MonBrightnessDown, execr, if [ "$(brightnessctl get)" -gt "$(($(brightnessctl max) / 10))" ]; then swayosd-client --brightness lower; else swayosd-client --brightness +0; fi


bindle = , XF86AudioPlay, execr, playerctl play-pause
bindle = , XF86AudioNext, execr, playerctl next
bindle = , XF86AudioPrev, execr, playerctl previous

# Cap lock
bindr = , Caps_Lock, execr, swayosd-client --caps-lock

# -----------------------------
#     Keymap - Screenshot
# -----------------------------
## Active monitor
bind = , print, execr, uwsm app -- "$scripts_dir"/screenshot.sh screen

## Active window
bind = SHIFT, print, execr, uwsm app -- "$scripts_dir"/screenshot.sh window


## Areaswaymsg workspace next
bind = ALT, print, execr, uwsm app -- "$scripts_dir"/screenshot.sh area

# Screenshot area and edit
bind = CTRL, print, execr, uwsm app -- "$scripts_dir"/screenshot.sh swappy

# -----------------------------
#  Keymap - Screen recording
# -----------------------------
## Toggle active monitor replay
bind = , F6, execr, uwsm app -- "$scripts_dir"/screen_recording.sh toggle_replay
bind = SHIFT, F6, execr, uwsm app -- "$scripts_dir"/screen_recording.sh toggle_replay_hdr

## Save replay
bind = , F9, execr, uwsm app -- "$scripts_dir"/screen_recording.sh save_replay

## Record screen
bind = , F10, execr, uwsm app -- "$scripts_dir"/screen_recording.sh screen
bind = SHIFT, F10, execr, uwsm app -- "$scripts_dir"/screen_recording.sh screen_hdr

## Record window
# bind = $MOD SHIFT, F10, execr, uwsm app -- "$scripts_dir"/screen_recording.sh window

## Record area
# bind = $MOD ALT, F10, execr, uwsm app -- "$scripts_dir"/screen_recording.sh portal

## Record portal
# bind = $MOD ALT SHIFT, F10, execr, uwsm app -- "$scripts_dir"/screen_recording.sh area

## Save and stop recording
bind = , F11, execr, uwsm app -- "$scripts_dir"/screen_recording.sh save_and_stop
bind = SHIFT, F11, execr, uwsm app -- "$scripts_dir"/screen_recording.sh save_and_stop

## Stop all
bind = CTRL, F11, execr, uwsm app -- "$scripts_dir"/screen_recording.sh stop_all

# -----------------------------
#        Permissions
# -----------------------------
permission = /usr/lib/xdg-desktop-portal-hyprland, screencopy, allow
permission = /usr/bin/hyprpicker, screencopy, allow
permission = /usr/bin/grim, screencopy, allow
permission = /usr/bin/gpu-screen-recorder, screencopy, allow
permission = /usr/bin/hyprlock, screencopy, allow

# Beast
permission = zsa-technology-labs-voyager, keyboard, allow
permission = zsa-technology-labs-voyager-.*, keyboard, allow
permission = hl-virtual-keyboard, keyboard, allow
permission = hl-virtual-keyboard-.*, keyboard, allow
permission = flydigi-flydigi-apex5-wireless-keyboard, keyboard, deny
permission = flydigi-flydigi-apex5-wireless-keyboard-.*, keyboard, deny

# Zenbook
permission = at-translated-set-2-keyboard, keyboard, deny
permission = at-translated-set-2-keyboard-1, keyboard, allow
permission = video-bus, keyboard, allow
permission = asus-wmi-hotkeys, keyboard, allow
permission = eee-pc-wmi-hotkeys, keyboard, deny
permission = power-button.*, keyboard, deny

# Lenovo
permission = ideapad-extra-buttons, keyboard, deny
permission = hd-audio-generic-headphone, keyboard, allow

permission = .*, keyboard, ask

# -----------------------------
#       Launch programs
# -----------------------------
# Terminal
bind = $MOD, return, execr, uwsm app -- kitty.desktop

# Menu
bind = $MOD, escape, execr, uwsm app -- fuzzel

bind = $MOD SHIFT, escape, execr, [ "$(hyprctl dispatch focuswindow class:launcher)" = "ok" ] || uwsm app -- kitty --class "launcher" -- "$HOME"/.config/hypr/fzf_menu/fzf-menu.sh

# File manager
bind = $MOD, e, execr, uwsm app -- zsh --interactive -c "exec kitty -- /usr/bin/lf"
bind = $MOD SHIFT, e, execr, uwsm app -- nautilus --new-window

# System monitor
bind = CTRL SHIFT, escape, execr, uwsm app -- gnome-system-monitor

# Web browser
bind = $MOD, w, execr, [ "$(hyprctl dispatch focuswindow class:librewolf)" != "ok" ] && uwsm app -- librewolf
bind = $MOD SHIFT, w, execr, uwsm app -- librewolf --new-window
bind = $MOD ALT, w, execr, uwsm app -- librewolf --private-window
bind = $MOD CTRL, w, execr, [ "$(hyprctl dispatch focuswindow class:firefox)" != "ok" ] && uwsm app -- firefox-safe

# Open note book
bind = $MOD, n, execr, uwsm app -- /usr/local/share/nvim-via-desktop -c "cd ~/Documents/Notebook" "$HOME"/Documents/Notebook/Note.md

# Calculator
bind = $MOD, c, execr, uwsm app -- gnome-calculator

# Calendar
bind = $MOD SHIFT, c, execr, uwsm app -- /usr/local/share/khal-via-desktop

# Email
bind = $MOD, m, execr, [ "$(hyprctl dispatch focuswindow class:aerc)" != "ok" ] && uwsm app -- kitty -- aerc
bind = $MOD SHIFT, m, execr, systemctl --user --no-block start mbsync.service

# Virtual machine.
# SPICE_NOGRAB=1 disable keyboard grab. E.g., 'win' key combinations and 'alt+tab'
bind = $MOD, i, execr, [ "$(hyprctl dispatch focuswindow class:virt-manager)" != "ok" ] && SPICE_NOGRAB=1 uwsm app -- virt-manager --connect qemu:///session --show-domain-console windows

# Keepassxc
bind = $MOD, p, execr, [ "$(hyprctl dispatch focuswindow class:keepassxc)" != "ok" ] && uwsm app -- keepassxc

