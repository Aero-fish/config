general {
    lock_cmd = pidof hyprlock || hyprlock # avoid starting multiple hyprlock instances.
    before_sleep_cmd = loginctl lock-session    # lock before suspend.
    after_sleep_cmd = hyprctl --quiet dispatch 'hl.dsp.dpms({ action = "on" })'  # to avoid having to press a key twice to turn on the display.
}

# Turn off monitor, if lock screen is engaged and user has no input for 10 sec.
listener {
    timeout = 10
    on-timeout = if pidof hyprlock; then hyprctl --quiet dispatch 'hl.dsp.dpms({ action = "off" })'; fi
    ignore_inhibit = true
}

# Lock
listener {
    timeout = 300
    on-timeout = "$HOME"/.config/hypr/scripts/lock.sh
}

# Screen off
listener {
    timeout = 310
    on-timeout = if pidof hyprlock; then hyprctl --quiet dispatch 'hl.dsp.dpms({ action = "off" })'; fi
}


# Suspend
listener {
    timeout = 600
    on-timeout = "$HOME"/.config/hypr/scripts/systemctl-inhibit-control.sh suspend-then-hibernate
}
