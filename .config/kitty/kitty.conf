# ----- Maple Mono NF CN config -----
# +ss03 is tag feature
font_features MapleMono-NF-CN-Light +cv01 +cv03 +ss03
font_features MapleMono-NF-CN-SemiBoldItalic +cv01 +cv03 +cv34 +cv35 +cv36 +ss03
font_features MapleMono-NF-CN-ExtraLightItalic +cv01 +cv03 +cv34 +cv35 +cv36 +ss03
font_features MapleMono-NF-CN-Regular +cv01 +cv03 +ss03
font_features MapleMono-NF-CN-ThinItalic +cv01 +cv03 +cv34 +cv35 +cv36 +ss03
font_features MapleMono-NF-CN-ExtraBold +cv01 +cv03 +ss03
font_features MapleMono-NF-CN-ExtraBoldItalic +cv01 +cv03 +cv34 +cv35 +cv36 +ss03
font_features MapleMono-NF-CN-MediumItalic +cv01 +cv03 +cv34 +cv35 +cv36 +ss03
font_features MapleMono-NF-CN-Italic +cv01 +cv03 +cv34 +cv35 +cv36 +ss03
font_features MapleMono-NF-CN-BoldItalic +cv01 +cv03 +cv34 +cv35 +cv36 +ss03
font_features MapleMono-NF-CN-LightItalic +cv01 +cv03 +cv34 +cv35 +cv36 +ss03
font_features MapleMono-NF-CN-Medium +cv01 +cv03 +ss03
font_features MapleMono-NF-CN-Bold +cv01 +cv03 +ss03
font_features MapleMono-NF-CN-Thin +cv01 +cv03 +ss03
font_features MapleMono-NF-CN-SemiBold +cv01 +cv03 +ss03
font_features MapleMono-NF-CN-ExtraLight +cv01 +cv03 +ss03

# ----- Kitty config -----
font_size 18.0

# Specify font for a unicode char
# symbol_map codepoints Font Family Name
# symbol_map U+E0A0-U+E0A3,U+E0C0-U+E0C7 Powerline Symbols

# Can be always/never/cursor
disable_ligatures cursor

# (thin|thick)-(sparse|dense)
undercurl_style thin-sparse

# -1=system default, 0=disable, others=interval in seconds
cursor_blink_interval 0
# cursor_stop_blinking_after 15.0

# Use negative number to change direction
# touch_scroll_multiplier 20.0

# Number of seconds to hide mouse
mouse_hide_wait 0

# Strip tailing space when copy, always/never/smart(not in rectangle selections)
strip_trailing_spaces smart

# Delay between screen updates (in milliseconds). 144Hz is 7ms. Default 10ms.
# repaint_delay 6

# Sync screen updates to the refresh rate of the monitor
sync_to_monitor yes

enable_audio_bell no
visual_bell_duration 0
window_alert_on_bell no
bell_on_tab ""  # Default "🔔 "

remember_window_size  no
initial_window_width  800
initial_window_height 600
window_padding_width 5

tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{index}.{title}"

background_opacity 1.0

allow_remote_control no
# listen_on unix:/tmp/kitty

# Do not check update
update_check_interval 0

scrollback_pager less -L -i -J -M -R -W -x4 -X -z-4 --incsearch

# Close the window when the child process (shell) exits. Regardless for disowned or
# backgrounded processes. Use this to prevent wl-clipboard stop kitty from closing.
close_on_child_death yes

clear_all_shortcuts yes
# kitty_mod=ctrl+shift

map kitty_mod+f1 toggle_marker iregex 1 \\bERROR\\b
# mark1_foreground black
# mark1_background #dc322f

map kitty_mod+f2 toggle_marker iregex 2 \\bWARNING\\b
# mark2_foreground black
# mark2_background #b58900

map kitty_mod+f3 toggle_marker iregex 3 \\bFAILED\\b
# mark3_foreground black
# mark3_background #268bd2

# Maker shortcuts
map kitty_mod+f4 create_marker
map kitty_mod+f5 remove_marker

# Conflict with detaching container ctrl-p,ctrl-q
#map ctrl+p scroll_to_mark prev
#map ctrl+n scroll_to_mark next

map kitty_mod+equal     change_font_size all +2.0
map kitty_mod+minus     change_font_size all -2.0
map kitty_mod+0         change_font_size all 0
# map kitty_mod+backspace change_font_size all 0

# map kitty_mod+v paste_from_clipboard
map ctrl+v paste_from_clipboard
# map kitty_mod+s paste_from_selection
# map kitty_mod+o pass_selection_to_program

# map kitty_mod+p>p kitten hints --type path --program -
# map kitty_mod+p>o kitten hints --type path
# map kitty_mod+p>l kitten hints --type line --program -
# map kitty_mod+p>w kitten hints --type word --program -
# map kitty_mod+p>h kitten hints --type hash --program -
# map kitty_mod+p>n kitten hints --type linenum
# map kitty_mod+p>y kitten hints --type hyperlink

map kitty_mod+u      kitten unicode_input

# map kitty_mod+up        scroll_line_up
# map kitty_mod+down      scroll_line_down
# map kitty_mod+page_up   scroll_page_up
# map kitty_mod+page_down scroll_page_down
# map kitty_mod+home      scroll_home
# map kitty_mod+end       scroll_end
map kitty_mod+f         show_scrollback
map kitty_mod+g        show_last_command_output

# Same as Ctrl+D, EOF
# map ctrl+w send_text all \x04
#map ctrl+w close_windowVH

# Map ctrl+c to copy, kitty+c to sent ^C
#map kitty_mod+c send_text all \x03
#map ctrl+c copy_to_clipboard
#map kitty_mod+c copy_to_clipboard
#map ctrl+c copy_or_interrupt
map ctrl+c copy_and_clear_or_interrupt

# moves the window into a new OS window
#map ctrl+f2 detach_window
# moves the window into a new Tab
#map ctrl+f3 detach_window new-tab
# moves the window into the previously active tab
#map ctrl+f3 detach_window tab-prev
# moves the window into the tab at the left of the active tab
#map ctrl+f3 detach_window tab-left
# asks which tab to move the window into
#map ctrl+f4 detach_window ask

# moves the tab into a new OS window
#map ctrl+f2 detach_tab
# asks which OS Window to move the tab into
#map ctrl+f4 detach_tab ask

#map f9 close_other_windows_in_tab
# map ctrl+shift+q quit

#map kitty_mod+right next_tab
#map kitty_mod+left  previous_tab
#map kitty_mod+t     new_tab
#map kitty_mod+q     close_tab
#map shift+cmd+w     close_os_window
#map kitty_mod+.     move_tab_forward
#map kitty_mod+,     move_tab_backward
